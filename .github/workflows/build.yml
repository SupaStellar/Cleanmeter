name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg,app
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        working-directory: tauri-app
        run: npm install --legacy-peer-deps

      - name: Install .NET SDK (Windows — for HardwareMonitor sidecar)
        if: matrix.platform == 'windows-latest'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build HardwareMonitor sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: HardwareMonitor/HardwareMonitor
        # Use -p: not /p: — Git Bash on Windows path-mangles /p:... into a
        # bogus path argument that dotnet treats as a project file (MSB1009).
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true
        shell: bash

      - name: Stage PresentMon assets into publish folder (Windows)
        if: matrix.platform == 'windows-latest'
        # The csproj's CopyPresentMon target writes to $(TargetDir)/native/,
        # not $(PublishDir)/. Tauri's resource globs read from publish/, so
        # presentmon.exe + ignored-processes.txt must land there explicitly.
        run: cp presentmon/* HardwareMonitor/HardwareMonitor/bin/Release/net8.0/win-x64/publish/
        shell: bash

      - name: List publish folder (Windows)
        if: matrix.platform == 'windows-latest'
        # Diagnostic — surfaces missing files (Tauri resource globs require
        # *.exe / *.dll / *.txt to match) so future breakage is obvious.
        run: ls -la HardwareMonitor/HardwareMonitor/bin/Release/net8.0/win-x64/publish/
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          tagName: v__VERSION__
          releaseName: "CleanMeter v__VERSION__"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: --bundles ${{ matrix.bundles }}
